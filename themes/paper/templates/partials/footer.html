<footer class="mx-auto flex h-[4.5rem] max-w-(--w) items-center px-8 text-xs tracking-wider uppercase opacity-60">
    <div class="mr-auto">
        {% if theme_config.copyrightText %}
            {{ theme_config.copyrightText|safe }}
        {% else %}
            &copy; {{ now|date:"2006" }}
            <a class="link" href="{{ config.domain }}">{{ config.siteName }}</a>
        {% endif %}
    </div>
    {% if theme_config.footerPoweredBy %}
    <a class="link" href="https://github.com/Gridea-Pro/gridea-pro" rel="noopener" target="_blank">powered by gridea pro</a>
    {% endif %}
</footer>
