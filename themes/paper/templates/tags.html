{% extends "base.html" %}

{% block title %}标签 - {{ config.siteName }}{% endblock %}

{% block main %}
<section class="tags-page">
    <header class="page-header">
        <h1>标签</h1>
        <p class="page-subtitle">{{ tags|length }} TAGS</p>
    </header>

    {% if tags|length > 0 %}
        <div class="tag-list">
            {% for tag in tags %}
                <a class="tag-pill" href="{{ tag.link }}">
                    <span class="tag-pill__name">{{ tag.name }}</span>
                    <span class="tag-pill__count">{{ tag.count }}</span>
                </a>
            {% endfor %}
        </div>
    {% else %}
        <p class="page-empty">暂无标签</p>
    {% endif %}
</section>
{% endblock %}
