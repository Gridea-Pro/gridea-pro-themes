{% extends "base.html" %}

{% block title %}标签 - {{ config.siteName }}{% endblock %}

{% block main %}
<section class="tags-page">
    <h1>标签</h1>

    {% if tags|length > 0 %}
        <div class="tags-cloud">
            {% for tag in tags %}
                <a class="tag-chip" href="{{ tag.link }}">
                    <span>{{ tag.name }}</span>
                    <span class="tag-count">{{ tag.count }}</span>
                </a>
            {% endfor %}
        </div>
    {% else %}
        <p class="page-empty">暂无标签。</p>
    {% endif %}
</section>
{% endblock %}
