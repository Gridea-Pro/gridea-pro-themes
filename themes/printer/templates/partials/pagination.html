{# 分页：Gridea Pro pagination 只暴露 prev / next URL #}
{% if pagination %}
{% if pagination.prev or pagination.next %}
<nav class="page-nav" aria-label="分页">
    <div class="page-nav-row">
        {% if pagination.prev %}
            <a href="{{ pagination.prev }}" class="page-nav-prev" rel="prev">← 上一页</a>
        {% else %}
            <span class="page-nav-prev page-nav-disabled">← 上一页</span>
        {% endif %}

        {% if pagination.next %}
            <a href="{{ pagination.next }}" class="page-nav-next" rel="next">下一页 →</a>
        {% else %}
            <span class="page-nav-next page-nav-disabled">下一页 →</span>
        {% endif %}
    </div>
</nav>
{% endif %}
{% endif %}
