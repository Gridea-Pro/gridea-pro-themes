{% extends "base.html" %}

{% block title %}标签 - {{ config.siteName }}{% endblock %}

{% block main %}
<section class="tags-page">
    <header class="masthead">
        <h1 class="masthead__title">标签</h1>
        <span class="masthead__subtitle">{{ tags|length }} TAGS</span>
    </header>

    {% if tags|length > 0 %}
        <div class="tag-cloud">
            {% for tag in tags %}
                <a class="tag-chip" href="{{ tag.link }}">
                    <span class="tag-chip__hash">#</span>
                    <span class="tag-chip__name">{{ tag.name }}</span>
                    <span class="tag-chip__count">{{ tag.count }}</span>
                </a>
            {% endfor %}
        </div>
    {% else %}
        <p class="empty-state">暂无标签</p>
    {% endif %}
</section>
{% endblock %}
