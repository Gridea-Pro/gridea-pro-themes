{# 文章列表行 — Cactus 风格的紧凑日期 + 标题（分类作为附加 meta） #}
<li class="post-item" data-link="{{ post.link }}" data-date="{{ post.date }}">
  <div class="meta">
    {% if post.isTop %}<span class="sticky-flag">[置顶]</span> {% endif %}
    <time datetime="{{ post.date }}">{{ post.date }}</time>
  </div>
  <span class="post-item-title">
    <a href="{{ post.link }}">{{ post.title }}</a>
    {% if post.categories|length > 0 %}
      <span class="post-item-cats">
        {% for cat in post.categories %}<a class="post-item-cat" href="{{ cat.link }}">/{{ cat.name }}</a>{% if not loop.last %} {% endif %}{% endfor %}
      </span>
    {% endif %}
  </span>
</li>
