{% if pagination.prev or pagination.next %}
<nav class="posts-nav" aria-label="分页导航">
  {% if pagination.prev %}
    <a href="{{ pagination.prev }}" class="post-page-numbers" rel="prev">
      <i class="bi bi-chevron-left me-1"></i>上一页
    </a>
  {% else %}
    <span class="post-page-numbers disabled"><i class="bi bi-chevron-left me-1"></i>上一页</span>
  {% endif %}

  {% if pagination.next %}
    <a href="{{ pagination.next }}" class="post-page-numbers" rel="next">
      下一页<i class="bi bi-chevron-right ms-1"></i>
    </a>
  {% else %}
    <span class="post-page-numbers disabled">下一页<i class="bi bi-chevron-right ms-1"></i></span>
  {% endif %}
</nav>
{% endif %}
