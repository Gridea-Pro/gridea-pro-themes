name: Validate Themes

on:
  pull_request:
    paths:
      - 'themes/**'
  push:
    branches: [main]
    paths:
      - 'themes/**'

# 豁免名单：仅限仓库初始化时带入的老主题 —— preview 缺失时只警告不阻塞
#
# ⚠️ 此名单是一次性历史遗留，请勿再添加新条目。
# 所有社区新提交的主题必须满足 preview 要求，没有例外。
env:
  GRANDFATHERED: "fly notes simple"

jobs:
  validate:
    name: Validate changed themes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed theme directories
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi

          # 处理首次 push（before 是全 0）
          if [ "$BASE" = "0000000000000000000000000000000000000000" ] || [ -z "$BASE" ]; then
            CHANGED=$(find themes -maxdepth 1 -mindepth 1 -type d -printf '%f\n' 2>/dev/null | sort -u)
          else
            CHANGED=$(git diff --name-only "$BASE" "$HEAD" -- 'themes/' \
              | awk -F/ 'NF>=2 && $1=="themes" {print $2}' \
              | sort -u)
          fi

          if [ -z "$CHANGED" ]; then
            echo "没有检测到 themes/ 下的改动"
            echo "dirs=" >> "$GITHUB_OUTPUT"
          else
            echo "检测到以下主题有改动:"
            echo "$CHANGED"
            echo "dirs=$(echo "$CHANGED" | tr '\n' ' ')" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate each theme
        if: steps.changed.outputs.dirs != ''
        run: |
          set -e
          FAIL=0
          for dir in ${{ steps.changed.outputs.dirs }}; do
            THEME_DIR="themes/$dir"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔍 校验主题: $dir"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            # 目录被整体删除：跳过（下架场景）
            if [ ! -d "$THEME_DIR" ]; then
              echo "  ℹ️  目录已删除，跳过校验"
              continue
            fi

            # 判断是否豁免
            IS_GRANDFATHERED=0
            for g in $GRANDFATHERED; do
              if [ "$g" = "$dir" ]; then
                IS_GRANDFATHERED=1
                echo "  ℹ️  此主题为初始种子主题，preview 缺失仅警告"
                break
              fi
            done

            # 目录命名：kebab-case
            if ! echo "$dir" | grep -qE '^[a-z0-9][a-z0-9-]{0,29}$'; then
              echo "  ❌ 目录名不合规（应为 kebab-case，小写字母/数字/连字符，不超过 30 字符）"
              FAIL=1
              continue
            fi

            # config.json
            if [ ! -f "$THEME_DIR/config.json" ]; then
              echo "  ❌ 缺少 config.json"
              FAIL=1
            else
              if ! jq empty "$THEME_DIR/config.json" 2>/dev/null; then
                echo "  ❌ config.json 不是合法 JSON"
                FAIL=1
              else
                # 必需字段
                for field in name version author description engine templateEngine; do
                  VAL=$(jq -r ".$field // empty" "$THEME_DIR/config.json")
                  if [ -z "$VAL" ]; then
                    echo "  ❌ config.json 缺少必需字段或字段为空: $field"
                    FAIL=1
                  fi
                done
                # engine 白名单（包含应用支持的别名）
                ENGINE=$(jq -r '.engine // empty' "$THEME_DIR/config.json")
                case "$ENGINE" in
                  jinja2|jinja|j2|ejs|go|gotemplate|gotemplates) ;;
                  "") ;;  # 已在上面报错
                  *)
                    echo "  ⚠️  engine=\"$ENGINE\" 不在支持列表内（jinja2 / ejs / go）"
                    ;;
                esac
              fi
            fi

            # preview 图：assets/media/preview.{png,jpg,jpeg,webp}
            PREVIEW_FOUND=0
            for ext in png jpg jpeg webp; do
              if [ -f "$THEME_DIR/assets/media/preview.$ext" ]; then
                PREVIEW_FOUND=1
                SIZE=$(stat -c%s "$THEME_DIR/assets/media/preview.$ext" 2>/dev/null || stat -f%z "$THEME_DIR/assets/media/preview.$ext")
                if [ "$SIZE" -gt 512000 ]; then
                  echo "  ⚠️  preview.$ext 超过 500KB（当前 ${SIZE} 字节），建议压缩"
                fi
                break
              fi
            done
            if [ $PREVIEW_FOUND -eq 0 ]; then
              if [ $IS_GRANDFATHERED -eq 1 ]; then
                echo "  ⚠️  缺少 assets/media/preview.{png,jpg,jpeg,webp}（豁免，仅警告）"
              else
                echo "  ❌ 缺少 assets/media/preview.{png,jpg,jpeg,webp}"
                FAIL=1
              fi
            fi

            # README.md
            if [ ! -f "$THEME_DIR/README.md" ]; then
              echo "  ❌ 缺少 README.md"
              FAIL=1
            fi

            # templates/
            if [ ! -d "$THEME_DIR/templates" ]; then
              echo "  ❌ 缺少 templates/ 目录"
              FAIL=1
            fi

            if [ $FAIL -eq 0 ]; then
              echo "  ✅ 通过"
            fi
          done

          if [ $FAIL -ne 0 ]; then
            echo ""
            echo "═════════════════════════════════════════"
            echo "❌ 校验失败，请根据上方提示修改"
            echo "   详细规范: docs/theme-spec.md"
            echo "═════════════════════════════════════════"
            exit 1
          fi

          echo ""
          echo "═════════════════════════════════════════"
          echo "✅ 所有主题校验通过"
          echo "═════════════════════════════════════════"
